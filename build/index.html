<!DOCTYPE html>
<html class="page" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Стартовый шаблон</title>
  <link rel="stylesheet" href="css/style.min.css">
</head>
<body class="page-body">
  <header class="page-header">
    <div class="page-header__container">
      <a class="page-header__logo">
        <span class="visually-hidden">Логотип</span>
        <svg role="img" width="200" height="55">
          <use xlink:href="img/sprite_auto.svg#icon-logo"></use>
        </svg>
      </a>
      <nav class="page-header__navigation navigation">
        <ul class="navigation__list">
          <li class="navigation__item">
            <a href="#">Контакты</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <h1 class="visually-hidden">Fix ремонт</h1>
    <section class="page-main__promo promo">
      <div class="promo__description">
        <h2>Ремонт квартир <br> в типовых домах</h2>
        <p>Готовый дизайн-проект, работы и материалы <br> за 3 месяца от 610 т.р.</p>
        <a class="promo__button" href="#">Узнайте о запуске первым</a>
        <span>Старт весной 2016</span>
        <a class="promo__link" href="#">Листайте вниз, <br> чтобы ничего не упустить</a>
      </div>
      <div class="promo__video">
        <a href="#">Смотреть видео</a>
      </div>

    </section>
    <section class="page-main__block1">block</section>
    <section class="page-main__block2">block2</section>

  </main>
  <footer class="page-footer">footer</footer>

</body>
</html>
